name: Deploy Notification

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Check for notify tag
        id: check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          NOTIFY_LINE=$(echo "$COMMIT_MSG" | grep -i '^notify:' | sed 's/^notify:\s*//' || true)
          if [ -n "$NOTIFY_LINE" ]; then
            echo "should_notify=true" >> "$GITHUB_OUTPUT"
            echo "message=$NOTIFY_LINE" >> "$GITHUB_OUTPUT"
          else
            echo "should_notify=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for Vercel deploy
        if: steps.check.outputs.should_notify == 'true'
        run: sleep 90

      - name: Send push notification
        if: steps.check.outputs.should_notify == 'true'
        env:
          DEPLOY_SECRET: ${{ secrets.DEPLOY_NOTIFY_SECRET }}
          NOTIFY_MSG: ${{ steps.check.outputs.message }}
        run: |
          curl -s -X POST \
            "https://bowling-tracker-omega.vercel.app/api/push/deploy-notify" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $DEPLOY_SECRET" \
            -d "$(jq -n --arg t "Spare Me? just got better" --arg b "$NOTIFY_MSG" '{title: $t, body: $b}')"
