<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#0a0e1a"/>
  <defs>
    <linearGradient id="pg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="sg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <!-- Bowling pin centered -->
  <g transform="translate(200, 56)">
    <circle cx="56" cy="40" r="36" fill="url(#pg)"/>
    <ellipse cx="56" cy="88" rx="22" ry="14" fill="url(#pg)"/>
    <ellipse cx="56" cy="170" rx="50" ry="68" fill="url(#pg)"/>
    <rect x="34" y="74" width="44" height="28" fill="url(#pg)"/>
    <rect x="18" y="96" width="76" height="42" fill="url(#pg)"/>
    <rect x="30" y="80" width="52" height="7" rx="3.5" fill="#ef4444"/>
    <rect x="30" y="91" width="52" height="7" rx="3.5" fill="#ef4444"/>
  </g>
  <!-- Spare "/" diagonal bar -->
  <rect x="290" y="60" width="36" height="340" rx="18" fill="url(#sg)" transform="rotate(15, 308, 230)"/>
  <!-- "?" dot -->
  <circle cx="350" cy="415" r="18" fill="#f59e0b"/>
</svg>
